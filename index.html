<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - Portal</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3906/3906577.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --card-bg: #f7f7f7;
            --border: #efefef;
            --scroll-thumb: #000000;
        }

        .dark-mode {
            --bg: #000000;
            --text: #ffffff;
            --card-bg: #111111;
            --border: #1a1a1a;
            --scroll-thumb: #ffffff;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden; 
        }

        nav { 
            height: 80px; 
            border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; 
        }

        /* FONT SIZES UPGRADED +2 LEVELS */
        .nav-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; }
        .aside-title { font-size: 36px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .filter-text { font-size: 14px; font-weight: 700; text-transform: uppercase; }
        .card-label { font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .info-text { font-size: 12px; font-weight: 700; opacity: 0.5; }

        .wrapper { display: flex; height: calc(100vh - 80px); }
        
        aside { width: 350px; border-right: 1px solid var(--border); padding: 40px; overflow-y: auto; }
        main { flex: 1; padding: 40px 60px; overflow-y: scroll; }
        
        .nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 32px; }

        .keeper-card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: card-enter 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: calc(var(--card-index, 0) * 45ms);
        }

        .img-container { 
            width: 100%;
            aspect-ratio: 1;
            background: var(--card-bg);
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.45s ease, border-color 0.3s ease;
            position: relative;
        }

        .img-container img {
            width: 68%;
            height: 68%;
            object-fit: contain;
            filter: drop-shadow(0 18px 18px rgba(0, 0, 0, 0.22));
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), filter 0.45s ease;
            animation: float-icon 3.8s ease-in-out infinite;
            animation-delay: calc(var(--card-index, 0) * 120ms);
        }

        .keeper-card:hover .img-container {
            transform: translateY(-8px) rotate(-1.5deg);
            box-shadow: 0 28px 48px rgba(0, 0, 0, 0.26);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .keeper-card:nth-child(even):hover .img-container { transform: translateY(-8px) rotate(1.5deg); }
        .keeper-card:hover .img-container img {
            transform: scale(1.08) rotate(4deg);
            filter: drop-shadow(0 24px 22px rgba(0, 0, 0, 0.3));
        }

        .label-wrap { display: flex; align-items: center; gap: 10px; }

        /* DOT BLINKING EFFECT */
        .dot { width: 6px; height: 6px; background: var(--text); flex-shrink: 0; }
        
        @keyframes pulse-kpr {
            0% { opacity: 1; }
            50% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        @keyframes card-enter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* เมื่อ Hover ที่การ์ด ให้จุดสี่เหลี่ยมกระพริบ */
        .keeper-card:hover .dot {
            animation: pulse-kpr 0.6s infinite ease-in-out;
        }

        /* Filter Sidebar */
        .filter-item { cursor: pointer; transition: all 0.2s; opacity: 0.3; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .filter-item:hover { opacity: 0.8; }
        .filter-item.active { opacity: 1; border-left: 3px solid var(--text); padding-left: 15px; margin-left: -15px; }

        main::-webkit-scrollbar { width: 5px; }
        main::-webkit-scrollbar-thumb { background: var(--scroll-thumb); }

        @media (max-width: 768px) {
            aside { width: 290px; padding: 28px; }
            main { padding: 28px 24px; }
            .nft-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 22px; }
            .img-container { border-radius: 24px; }
            .img-container img { width: 72%; height: 72%; }
        }
    </style>
</head>
<body class="dark-mode">

    <nav>
        <div class="flex gap-2 flex-col"><span class="w-8 h-[3px] bg-current"></span><span class="w-8 h-[3px] bg-current"></span></div>
        <div class="nav-title hidden md:block">Jam Dashboard // Gallery</div>
        <div class="nav-title">Dark Mode</div>
    </nav>

    <div class="wrapper">
        <aside>
            <h1 class="aside-title mb-10">Filters</h1>
            <div id="filterContainer"></div>
        </aside>

        <main>
            <div id="itemCount" class="info-text mb-10 tracking-[0.2em]"></div>
            <div class="nft-grid" id="dashboardGrid"></div>
        </main>
    </div>

    <script>

            { name: "Uoriki", img: "assets/thiings/sushi.png", link: "https://lookerstudio.google.com/reporting/e4b5c380-9403-4e1c-852e-9c50debb1883/page/p_fmw4hgzvrd", cat: "P_Yui" },
            { name: "ThaiLaos", img: "assets/thiings/laos.png", link: "https://lookerstudio.google.com/u/0/reporting/4131dc0b-814c-4c6f-baa5-8b01d3bdfbce/page/tMQtF", cat: "LSM" },
            { name: "GQ Easy", img: "assets/thiings/linen-blazer.png", link: "https://lookerstudio.google.com/reporting/bf4d91e9-7971-4422-b866-b1b1a4566274", cat: "LSM" },
            { name: "หลุมข้าง Vault", img: "assets/thiings/washing-machine.png", link: "https://lookerstudio.google.com/reporting/150b8a3f-7ea0-4bab-9053-c734508b0d64", cat: "LSM" },
            { name: "Snackup & Choco", img: "assets/thiings/candy-1.png", link: "https://lookerstudio.google.com/reporting/a8c1ea56-c535-44c0-a96f-15865ba20648", cat: "LSM" },

            { name: "[UB] Opentype", img: "assets/thiings/fruit.png", link: "https://lookerstudio.google.com/reporting/e286221c-59c8-4b7f-ad2f-8e925a0c7cf5", cat: "LSM" },
            { name: "[CM] Cheese", img: "assets/thiings/cheese.png", link: "https://lookerstudio.google.com/u/0/reporting/d81e0aa4-ab21-4797-ad66-4100d565da1b/page/p_fmw4hgzvrd", cat: "LSM" },
            { name: "[RSL] Salad", img: "assets/thiings/salad.png", link: "https://lookerstudio.google.com/reporting/3b9d2ae9-725b-40b4-b529-cc891fb74332", cat: "LSM" },
            { name: "Compet MTD", img: "assets/thiings/charts.png", link: "https://lookerstudio.google.com/reporting/c81483cc-0095-4e2c-a231-8f13dff8f606/page/p_zoblimqltd", cat: "Compet" },
            { name: "Compet YTD", img: "assets/thiings/graph.png", link: "https://lookerstudio.google.com/reporting/8db003b6-b407-4012-a9fc-05df1360ba45/page/p_oshn5jmvvd", cat: "Compet" },
            { name: "Adhoc Compet", img: "assets/thiings/stock-trading-arrow.png", link: "https://lookerstudio.google.com/reporting/4bd48d0c-8f5c-46b2-9667-b66c9cd658f9", cat: "Compet" },
            { name: "Rebound", img: "assets/thiings/dashboard.png", link: "https://lookerstudio.google.com/reporting/508f9525-73ad-46a4-ac87-539694744dd8/page/p_hsmlex7dwd", cat: "Compet" },
            { name: "All Care Pharmacy", img: "assets/thiings/pharmacist.png", link: "https://lookerstudio.google.com/reporting/90b1245a-a10b-4608-ac20-a4dcf5ea6267", cat: "Project" },
            { name: "All Care", img: "assets/thiings/soap.png", link: "https://lookerstudio.google.com/reporting/7cb004e2-0eb4-4696-a621-b050426578dc/page/p_ssu0nzv2md", cat: "Project" },
            { name: "All Select", img: "assets/thiings/reusable-coffee-cup.png", link: "https://lookerstudio.google.com/reporting/f6724a5f-2eb1-407b-b824-b4ad9dac4503", cat: "Project" },
            { name: "All Supreme", img: "assets/thiings/nitro-coffee-tap.png", link: "https://lookerstudio.google.com/reporting/07f709ce-2733-413f-9052-e62da5a12280/page/p_jkas8ewjld", cat: "Project" },
            { name: "Happy Pet", img: "assets/thiings/dog.png", link: "https://lookerstudio.google.com/reporting/b9a4ed87-8c67-49a9-a4c6-57502a33d138/page/X0YfD", cat: "Project" },
            { name: "Mom & Kids", img: "assets/thiings/double-stroller.png", link: "https://lookerstudio.google.com/reporting/2146509c-c96a-4e7f-82cc-8d57f8225639", cat: "Project" },
            { name: "Saving/LinkPack", img: "assets/thiings/parcel.png", link: "https://lookerstudio.google.com/reporting/30dec1be-2878-467e-a034-bd2351b9a571", cat: "Project" },
            { name: "LSM_Sale", img: "assets/thiings/pricelist.png", link: "https://lookerstudio.google.com/reporting/1b10eb4a-41bc-4729-ad70-ac1d9eade6bb/page/p_b0245nd5kd", cat: "Tools" },
            { name: "Searching", img: "assets/thiings/search-magnifier.png", link: "https://lookerstudio.google.com/reporting/b22458d3-8f6c-4633-8c29-a461cde8abcf/page/g8eAF", cat: "Tools" },
            { name: "Adhoc Missing", img: "assets/thiings/error.png", link: "https://lookerstudio.google.com/reporting/6cc0284d-39e5-4bf7-91b9-4ae0e810e416/page/p_i20dh0iomd", cat: "Tools" }
        ];

        let currentFilter = 'ALL';
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

        function scramble(el, text) {
            let n = 0;
            let interval = setInterval(() => {
                el.innerText = text.split("").map((c, i) => i < n ? text[i] : chars[Math.floor(Math.random()*chars.length)]).join("");
                if (n >= text.length) clearInterval(interval);
                n += 1/3;
            }, 30);
        }

        function filterData(category) {
            currentFilter = category;
            render();
        }

        function render() {
            const filtered = currentFilter === 'ALL' ? dashboards : dashboards.filter(d => d.cat === currentFilter);
            
            document.getElementById('dashboardGrid').innerHTML = filtered.map((db, index) => `
                <a href="${db.link}" target="_blank" class="keeper-card" style="--card-index:${index}">
                    <div class="img-container"><img src="${db.img}"></div>
                    <div class="label-wrap">
                        <div class="dot"></div>
                        <span class="card-label name-tag" data-name="${db.name}">${db.name}</span>
                    </div>
                </a>
            `).join("");

            document.querySelectorAll('.keeper-card').forEach(card => {
                const tag = card.querySelector('.name-tag');
                card.onmouseenter = () => scramble(tag, tag.dataset.name);
            });

            const cats = ['ALL', ...new Set(dashboards.map(d => d.cat))];
            document.getElementById('filterContainer').innerHTML = cats.map(c => `
                <div class="filter-item ${currentFilter === c ? 'active' : ''}" onclick="filterData('${c}')">
                    <div class="flex justify-between filter-text">
                        <span>${c}</span><span class="opacity-40">(${c === 'ALL' ? dashboards.length : dashboards.filter(d => d.cat === c).length})</span>
                    </div>
                </div>
            `).join("");

            document.getElementById('itemCount').innerText = `${filtered.length} ITEMS IDENTIFIED`;
        }

        render();
    </script>
</body>
</html>
