<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Dashboard - Portal</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3906/3906577.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --card-bg: #f7f7f7;
            --border: #efefef;
            --scroll-thumb: #000000;
        }

        .dark-mode {
            --bg: #000000;
            --text: #ffffff;
            --card-bg: #111111;
            --border: #1a1a1a;
            --scroll-thumb: #ffffff;
        }

        body { 
            font-family: 'Space Mono', monospace; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow: hidden; 
        }

        nav { 
            height: 80px; 
            border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 40px; 
        }

        /* FONT SIZES UPGRADED +2 LEVELS */
        .nav-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; }
        .aside-title { font-size: 36px; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .filter-text { font-size: 14px; font-weight: 700; text-transform: uppercase; }
        .card-label { font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .info-text { font-size: 12px; font-weight: 700; opacity: 0.5; }

        .wrapper { display: flex; height: calc(100vh - 80px); }
        
        aside { width: 350px; border-right: 1px solid var(--border); padding: 40px; overflow-y: auto; }
        main { flex: 1; padding: 40px 60px; overflow-y: scroll; }
        
        .nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 32px; }

        .keeper-card {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            animation: card-enter 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: calc(var(--card-index, 0) * 45ms);
            --hover-tilt: -1.5deg;
        }

        .img-container { 
            width: 100%;
            aspect-ratio: 1;
            background: var(--card-bg);
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.45s ease, border-color 0.3s ease;
            position: relative;
            isolation: isolate;
        }

        .img-container::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        .icon-motion {
            width: 68%;
            height: 68%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 18px 18px rgba(0, 0, 0, 0.22));
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), filter 0.45s ease;
        }

        .keeper-card:hover .img-container {
            transform: translateY(-8px) rotate(var(--hover-tilt));
            box-shadow: 0 28px 48px rgba(0, 0, 0, 0.26);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .keeper-card:nth-child(even) { --hover-tilt: 1.5deg; }
        .keeper-card:hover .img-container img {
            transform: scale(1.08) rotate(4deg);
            filter: drop-shadow(0 24px 22px rgba(0, 0, 0, 0.3));
        }

        .label-wrap { display: flex; align-items: center; gap: 10px; }

        /* DOT BLINKING EFFECT */
        .dot { width: 6px; height: 6px; background: var(--text); flex-shrink: 0; }
        
        @keyframes pulse-kpr {
            0% { opacity: 1; }
            50% { opacity: 0.1; }
            100% { opacity: 1; }
        }

        @keyframes card-enter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes drip-sway { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(2deg); } }
        @keyframes fry-sizzle { 0%,100% { transform: translate(0,0) rotate(0); } 20% { transform: translate(-2px,-2px) rotate(-5deg); } 40% { transform: translate(2px,1px) rotate(4deg); } 60% { transform: translate(-1px,-1px) rotate(-3deg); } 80% { transform: translate(2px,0) rotate(2deg); } }
        @keyframes tea-orbit { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-8px) rotate(4deg); } }
        @keyframes bread-stretch { 0%,100% { transform: scale(1,1); } 30% { transform: scale(0.92,1.08); } 60% { transform: scale(1.04,0.96); } }
        @keyframes zapp-shake { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-7deg) translateX(-3px); } 50% { transform: rotate(7deg) translateX(3px); } 75% { transform: rotate(-4deg) translateX(-2px); } }
        @keyframes suki-swirl { 0% { transform: rotate(0) translateY(0); } 50% { transform: rotate(10deg) translateY(-9px); } 100% { transform: rotate(0) translateY(0); } }
        @keyframes gaggia-pump { 0%,100% { transform: scale(1); } 30% { transform: scale(1.06,0.94); } 55% { transform: scale(0.96,1.04); } }
        @keyframes pan-toss { 0%,100% { transform: translateY(0) rotate(0); } 35% { transform: translateY(-12px) rotate(-9deg); } 70% { transform: translateY(-3px) rotate(7deg); } }
        @keyframes pizza-spin { 0%,100% { transform: rotate(0); } 50% { transform: rotate(12deg); } }
        @keyframes sushi-swim { 0%,100% { transform: translateX(0) rotate(0); } 25% { transform: translateX(-8px) rotate(-4deg); } 75% { transform: translateX(8px) rotate(4deg); } }
        @keyframes laos-swing { 0%,100% { transform: rotate(-3deg) translateY(0); } 50% { transform: rotate(3deg) translateY(-5px); } }
        @keyframes gq-strut { 0%,100% { transform: translateY(0) skewX(0); } 50% { transform: translateY(-10px) skewX(-4deg); } }
        @keyframes vault-rumble { 0%,100% { transform: rotate(0); } 20% { transform: rotate(-4deg); } 40% { transform: rotate(4deg); } 60% { transform: rotate(-3deg); } 80% { transform: rotate(3deg); } }
        @keyframes snack-bounce { 0%,100% { transform: translateY(0) scale(1); } 30% { transform: translateY(-12px) scale(1.06); } 60% { transform: translateY(0) scale(0.96); } }
        @keyframes choco-melt { 0%,100% { transform: scale(1,1); } 50% { transform: scale(1.04,0.95) translateY(4px); } }
        @keyframes oil-slosh { 0%,100% { transform: rotate(-2deg) translateX(0); } 50% { transform: rotate(6deg) translateX(3px); } }
        @keyframes alert-blink { 0%,100% { opacity: 1; transform: scale(1); } 25% { opacity: 0.45; transform: scale(0.96); } 50% { opacity: 1; transform: scale(1.06); } }
        @keyframes pin-drop { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-14px); } 70% { transform: translateY(4px); } }
        @keyframes person-radar { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes fruit-roll { 0%,100% { transform: rotate(0) translateY(0); } 50% { transform: rotate(14deg) translateY(-7px); } }
        @keyframes cheese-wobble { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-6deg) translateY(-3px); } 50% { transform: rotate(6deg) translateY(-7px); } 75% { transform: rotate(-3deg); } }
        @keyframes salad-toss { 0%,100% { transform: rotate(0) scale(1); } 50% { transform: rotate(-12deg) scale(1.06); } }
        @keyframes chart-rise { 0%,100% { transform: translateY(0) scaleY(1); } 50% { transform: translateY(-9px) scaleY(1.08); } }
        @keyframes graph-climb { 0%,100% { transform: translate(0,0); } 50% { transform: translate(8px,-10px); } }
        @keyframes trade-dart { 0%,100% { transform: translate(0,0) rotate(0); } 50% { transform: translate(10px,-12px) rotate(10deg); } }
        @keyframes rebound-pop { 0%,100% { transform: translateY(0) scale(1); } 35% { transform: translateY(10px) scale(0.94); } 65% { transform: translateY(-14px) scale(1.05); } }
        @keyframes pharmacy-pop { 0%,100% { transform: scale(1); } 45% { transform: scale(1.12); } 70% { transform: scale(0.98); } }
        @keyframes care-bubble { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-8px) rotate(5deg); } }
        @keyframes select-sip { 0%,100% { transform: rotate(0) translateY(0); } 50% { transform: rotate(-9deg) translateY(-9px); } }
        @keyframes supreme-pour { 0%,100% { transform: rotate(0); } 50% { transform: rotate(9deg) translateY(-6px); } }
        @keyframes pet-hop { 0%,100% { transform: translateY(0) rotate(0); } 30% { transform: translateY(-12px) rotate(-8deg); } 60% { transform: translateY(-2px) rotate(6deg); } }
        @keyframes stroller-roll { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes parcel-shift { 0%,100% { transform: translateY(0) rotate(0); } 35% { transform: translateY(-8px) rotate(-4deg); } 70% { transform: translateY(-2px) rotate(4deg); } }
        @keyframes sale-swing { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(6deg) translateY(-6px); } }
        @keyframes search-peek { 0%,100% { transform: translateX(0); } 50% { transform: translateX(10px) rotate(6deg); } }
        @keyframes error-glitch { 0%,100% { transform: translate(0,0); } 20% { transform: translate(-3px,2px); } 40% { transform: translate(3px,-2px); } 60% { transform: translate(-2px,-1px); } 80% { transform: translate(2px,1px); } }

        .keeper-card[data-motion="drip-coffee"] .icon-motion { animation: drip-sway 4.2s ease-in-out infinite; }
        .keeper-card[data-motion="fried-food"] .icon-motion { animation: fry-sizzle 1.4s ease-in-out infinite; }
        .keeper-card[data-motion="all-tea"] .icon-motion { animation: tea-orbit 4.6s ease-in-out infinite; }
        .keeper-card[data-motion="french-bread"] .icon-motion { animation: bread-stretch 2.6s ease-in-out infinite; }
        .keeper-card[data-motion="all-zapp"] .icon-motion { animation: zapp-shake 1.6s ease-in-out infinite; }
        .keeper-card[data-motion="suki-cup"] .icon-motion { animation: suki-swirl 3.6s ease-in-out infinite; }
        .keeper-card[data-motion="gaggia"] .icon-motion { animation: gaggia-pump 2.4s ease-in-out infinite; }
        .keeper-card[data-motion="go-pan"] .icon-motion { animation: pan-toss 3.2s ease-in-out infinite; }
        .keeper-card[data-motion="go-pizza"] .icon-motion { animation: pizza-spin 3.4s ease-in-out infinite; }
        .keeper-card[data-motion="uoriki"] .icon-motion { animation: sushi-swim 4s ease-in-out infinite; }
        .keeper-card[data-motion="thai-laos"] .icon-motion { animation: laos-swing 4.2s ease-in-out infinite; }
        .keeper-card[data-motion="gq-easy"] .icon-motion { animation: gq-strut 3.2s ease-in-out infinite; }
        .keeper-card[data-motion="vault"] .icon-motion { animation: vault-rumble 2.5s ease-in-out infinite; }
        .keeper-card[data-motion="snackup"] .icon-motion { animation: snack-bounce 2.3s ease-in-out infinite; }
        .keeper-card[data-motion="chococlub"] .icon-motion { animation: choco-melt 3.8s ease-in-out infinite; }
        .keeper-card[data-motion="fullshelfoil"] .icon-motion { animation: oil-slosh 3.5s ease-in-out infinite; }
        .keeper-card[data-motion="missing-agc"] .icon-motion { animation: alert-blink 1.8s ease-in-out infinite; }
        .keeper-card[data-motion="store-tour"] .icon-motion { animation: pin-drop 2.4s ease-in-out infinite; }
        .keeper-card[data-motion="missing-project"] .icon-motion { animation: person-radar 2.6s ease-in-out infinite; }
        .keeper-card[data-motion="ub-opentype"] .icon-motion { animation: fruit-roll 3.2s ease-in-out infinite; }
        .keeper-card[data-motion="cm-cheese"] .icon-motion { animation: cheese-wobble 2.7s ease-in-out infinite; }
        .keeper-card[data-motion="rsl-salad"] .icon-motion { animation: salad-toss 3.2s ease-in-out infinite; }
        .keeper-card[data-motion="compet-mtd"] .icon-motion { animation: chart-rise 2.8s ease-in-out infinite; }
        .keeper-card[data-motion="compet-ytd"] .icon-motion { animation: graph-climb 4.5s ease-in-out infinite; }
        .keeper-card[data-motion="adhoc-compet"] .icon-motion { animation: trade-dart 2.7s ease-in-out infinite; }
        .keeper-card[data-motion="rebound"] .icon-motion { animation: rebound-pop 2.1s ease-in-out infinite; }
        .keeper-card[data-motion="all-care-pharmacy"] .icon-motion { animation: pharmacy-pop 2.6s ease-in-out infinite; }
        .keeper-card[data-motion="all-care"] .icon-motion { animation: care-bubble 3.3s ease-in-out infinite; }
        .keeper-card[data-motion="all-select"] .icon-motion { animation: select-sip 3.1s ease-in-out infinite; }
        .keeper-card[data-motion="all-supreme"] .icon-motion { animation: supreme-pour 3.8s ease-in-out infinite; }
        .keeper-card[data-motion="happy-pet"] .icon-motion { animation: pet-hop 2.5s ease-in-out infinite; }
        .keeper-card[data-motion="mom-kids"] .icon-motion { animation: stroller-roll 3.2s ease-in-out infinite; }
        .keeper-card[data-motion="linkpack"] .icon-motion { animation: parcel-shift 3s ease-in-out infinite; }
        .keeper-card[data-motion="lsm-sale"] .icon-motion { animation: sale-swing 3.6s ease-in-out infinite; }
        .keeper-card[data-motion="searching"] .icon-motion { animation: search-peek 2.4s ease-in-out infinite; }
        .keeper-card[data-motion="adhoc-missing"] .icon-motion { animation: error-glitch 1.9s ease-in-out infinite; }

        .keeper-card[data-motion="searching"]:hover .img-container::after {
            opacity: 1;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 42%, rgba(255,255,255,0.45) 50%, rgba(255,255,255,0.08) 58%, transparent 100%);
            animation: search-scan 1.2s ease-out infinite;
        }

        .keeper-card[data-motion="store-tour"]:hover .img-container::after,
        .keeper-card[data-motion="missing-project"]:hover .img-container::after,
        .keeper-card[data-motion="all-care"]:hover .img-container::after,
        .keeper-card[data-motion="gq-easy"]:hover .img-container::after {
            opacity: 1;
        }

        .keeper-card[data-motion="store-tour"]:hover .img-container::after {
            inset: 24%;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            animation: ping-ring 1.3s ease-out infinite;
            background: transparent;
        }

        .keeper-card[data-motion="missing-project"]:hover .img-container::after {
            inset: 18%;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            animation: ping-ring 1.4s ease-out infinite;
            background: transparent;
        }

        .keeper-card[data-motion="all-care"]:hover .img-container::after {
            background:
                radial-gradient(circle at 28% 72%, rgba(255,255,255,0.2) 0 8px, transparent 9px),
                radial-gradient(circle at 50% 46%, rgba(255,255,255,0.16) 0 11px, transparent 12px),
                radial-gradient(circle at 72% 66%, rgba(255,255,255,0.18) 0 7px, transparent 8px);
            animation: bubble-rise 1.6s ease-out infinite;
        }

        .keeper-card[data-motion="gq-easy"]:hover .img-container::after {
            background: linear-gradient(120deg, transparent 35%, rgba(255,255,255,0.22) 50%, transparent 65%);
            animation: style-flash 1s ease-out infinite;
        }

        @keyframes search-scan { from { transform: translateX(-120%); } to { transform: translateX(120%); } }
        @keyframes ping-ring { from { transform: scale(0.5); opacity: 0.65; } to { transform: scale(1.55); opacity: 0; } }
        @keyframes bubble-rise { from { transform: translateY(16px); opacity: 0.15; } to { transform: translateY(-18px); opacity: 0.6; } }
        @keyframes style-flash { from { transform: translateX(-140%) skewX(-18deg); opacity: 0; } 40% { opacity: 1; } to { transform: translateX(140%) skewX(-18deg); opacity: 0; } }

        /* เมื่อ Hover ที่การ์ด ให้จุดสี่เหลี่ยมกระพริบ */
        .keeper-card:hover .dot {
            animation: pulse-kpr 0.6s infinite ease-in-out;
        }

        /* Filter Sidebar */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.45;
            margin-bottom: 10px;
        }

        .search-input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 16px 18px;
            margin-bottom: 32px;
            outline: none;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 0;
        }

        .search-input::placeholder {
            color: var(--text);
            opacity: 0.35;
        }

        .search-input:focus {
            border-color: var(--text);
        }

        .filter-item { cursor: pointer; transition: all 0.2s; opacity: 0.3; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .filter-item:hover { opacity: 0.8; }
        .filter-item.active { opacity: 1; border-left: 3px solid var(--text); padding-left: 15px; margin-left: -15px; }
        main::-webkit-scrollbar { width: 5px; }
        main::-webkit-scrollbar-thumb { background: var(--scroll-thumb); }

        @media (max-width: 768px) {
            aside { width: 290px; padding: 28px; }
            main { padding: 28px 24px; }
            .nft-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 22px; }
            .img-container { border-radius: 24px; }
            .icon-motion { width: 72%; height: 72%; }
        }
    </style>
</head>
<body class="dark-mode">

    <nav>
        <div class="flex gap-2 flex-col"><span class="w-8 h-[3px] bg-current"></span><span class="w-8 h-[3px] bg-current"></span></div>
        <div class="nav-title hidden md:block">Jam Dashboard Gallery</div>
        <div class="w-8"></div>
    </nav>

    <div class="wrapper">
        <aside>
            <input id="searchInput" class="search-input" type="search" placeholder="Search dashboard" autocomplete="off">
            <div class="section-label">Categories</div>
            <div id="filterContainer"></div>
        </aside>

        <main>
            <div id="itemCount" class="info-text mb-10 tracking-[0.2em]"></div>
            <div class="nft-grid" id="dashboardGrid"></div>
        </main>
    </div>

        let currentFilter = 'ALL';
        let searchQuery = '';
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const motionMap = {
            "Drip Coffee": "drip-coffee",
            "Fried Food": "fried-food",
            "All Tea": "all-tea",
            "French Bread": "french-bread",
            "All Zapp": "all-zapp",
            "Suki Cup": "suki-cup",
            "Gaggia": "gaggia",
            "Go Pan": "go-pan",
            "Go Pizza": "go-pizza",
            "Uoriki": "uoriki",
            "ThaiLaos": "thai-laos",
            "GQ Easy": "gq-easy",
            "หลุมข้าง Vault": "vault",
            "Snackup & Choco": "snackup",
            "ChocoClub": "chococlub",
            "FullShelfOil": "fullshelfoil",
            "Missing AGC AC": "missing-agc",
            "Store Tour": "store-tour",
            "Missing All Project": "missing-project",
            "[UB] Opentype": "ub-opentype",
            "[CM] Cheese": "cm-cheese",
            "[RSL] Salad": "rsl-salad",
            "Compet MTD": "compet-mtd",
            "Compet YTD": "compet-ytd",
            "Adhoc Compet": "adhoc-compet",
            "Rebound": "rebound",
            "All Care Pharmacy": "all-care-pharmacy",
            "All Care": "all-care",
            "All Select": "all-select",
            "All Supreme": "all-supreme",
            "Happy Pet": "happy-pet",
            "Mom & Kids": "mom-kids",
            "Saving/LinkPack": "linkpack",
            "LSM_Sale": "lsm-sale",
            "Searching": "searching",
            "Adhoc Missing": "adhoc-missing"
        };

        function scramble(el, text) {
            let n = 0;
            let interval = setInterval(() => {
                el.innerText = text.split("").map((c, i) => i < n ? text[i] : chars[Math.floor(Math.random()*chars.length)]).join("");
                if (n >= text.length) clearInterval(interval);
                n += 1/3;
            }, 30);
        }

        function filterData(category) {
            currentFilter = category;
            render();
        }

        function searchData(value) {
            searchQuery = value.trim().toLowerCase();
            render();
        }

        function render() {
            const filtered = dashboards.filter(d => {
                const matchesCategory = currentFilter === 'ALL' || d.cat === currentFilter;
                const matchesSearch = !searchQuery || `${d.name} ${d.cat}`.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });
            
            document.getElementById('dashboardGrid').innerHTML = filtered.map((db, index) => `
                <a href="${db.link}" target="_blank" class="keeper-card" data-motion="${motionMap[db.name] || 'drip-coffee'}" style="--card-index:${index}">
                    <div class="img-container">
                        <div class="icon-motion"><img src="${db.img}" alt="${db.name}"></div>
                    </div>
                    <div class="label-wrap">
                        <div class="dot"></div>
                        <span class="card-label name-tag" data-name="${db.name}">${db.name}</span>
                    </div>
                </a>
            `).join("");

            document.querySelectorAll('.keeper-card').forEach(card => {
                const tag = card.querySelector('.name-tag');
                card.onmouseenter = () => scramble(tag, tag.dataset.name);
            });

            const cats = ['ALL', ...new Set(dashboards.map(d => d.cat))];
            document.getElementById('filterContainer').innerHTML = cats.map(c => `
                <div class="filter-item ${currentFilter === c ? 'active' : ''}" onclick="filterData('${c}')">
                    <div class="flex justify-between filter-text">
                        <span>${c}</span><span class="opacity-40">(${c === 'ALL' ? dashboards.length : dashboards.filter(d => d.cat === c).length})</span>
                    </div>
                </div>
            `).join("");

            document.getElementById('itemCount').innerText = `${filtered.length} ITEMS IDENTIFIED`;
        }

        document.getElementById('searchInput').addEventListener('input', e => searchData(e.target.value));
        render();
    </script>
